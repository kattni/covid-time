name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            format: ""
            package_args: '--identity "$APPLE_SIGNING_IDENTITY" --no-wait'
          - os: windows-latest
            format: ""
            package_args: '--identity "$WINDOWS_SIGNING_IDENTITY" --no-input'
#          - os: ubuntu-latest
#            format: "linux flatpak"
#            package_args: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: runner.os != 'Linux'   # Linux uses the system python3 (Briefcase requires it)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Briefcase
        run: pip install git+https://github.com/beeware/briefcase.git@main

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak flatpak-builder \
            gir1.2-gtk-3.0 libcairo2-dev libcanberra-gtk3-module libgirepository1.0-dev \
            libpango1.0-dev libgdk-pixbuf2.0-dev pkg-config

      - name: Windows certificate
        if: runner.os == 'Windows'
        run: |
          echo "${{ secrets.WINDOWS_CERTIFICATE }}" | Out-File cert.b64
          certutil -decode cert.b64 cert.pfx
          $CertPassword = ConvertTo-SecureString "${{ secrets.WINDOWS_CERTIFICATE_PWD }}" -AsPlainText -Force
          Import-PfxCertificate -FilePath .\cert.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $CertPassword 

      - name: Set up macOS code-signing & notarization
        if: runner.os == 'macOS'
        uses: ./.github/actions/macos-signing-setup
        with:
          certificate: ${{ secrets.MACOS_CERTIFICATE }}
          certificate-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          team-id: ${{ vars.APPLE_TEAM_ID }}
          asc-api-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          asc-api-key-id: ${{ vars.APP_STORE_CONNECT_API_KEY_ID }}
          asc-api-key-issuer: ${{ vars.APP_STORE_CONNECT_API_KEY_ISSUER }}

      - name: briefcase create
        run: briefcase create ${{ matrix.format }}

      - name: briefcase build
        run: briefcase build ${{ matrix.format }}

      - name: briefcase package
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
          WINDOWS_SIGNING_IDENTIFY: ${{ vars.WINDOWS_SIGNING_IDENTITY }}
        run: briefcase package ${{ matrix.format }} ${{ matrix.package_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: COVID-Time-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  finalize:
    name: Finalize (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            format: ""
            package_args: '--identity "$APPLE_SIGNING_IDENTITY" --no-wait'
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Briefcase
        run: pip install git+https://github.com/beeware/briefcase.git@main

      - name: Set up macOS code-signing & notarization
        uses: ./.github/actions/macos-signing-setup
        with:
          certificate: ${{ secrets.MACOS_CERTIFICATE }}
          certificate-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          team-id: ${{ vars.APPLE_TEAM_ID }}
          asc-api-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          asc-api-key-id: ${{ vars.APP_STORE_CONNECT_API_KEY_ID }}
          asc-api-key-issuer: ${{ vars.APP_STORE_CONNECT_API_KEY_ISSUER }}

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: COVID-Time-${{ matrix.os }}
          path: dist

      - name: briefcase package
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
        run: briefcase package ${{ matrix.format }} ${{ matrix.package_args }}

      - name: Upload updated artifact
        uses: actions/upload-artifact@v7
        with:
          name: COVID-Time-${{ matrix.os }}
          path: dist/*.dmg
          if-no-files-found: error
          overwrite: true

  release:
    needs: finalize   # finalize depends on all build legs; never release a partial build
    runs-on: ubuntu-latest
    env:
      # Tag pushes ship on the pushed tag; workflow_dispatch creates a CI prerelease
      # with a generated tag so test runs don't masquerade as real releases.
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('ci-{0}', github.run_number) }}
      IS_PRERELEASE: ${{ !startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release and attach artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.IS_PRERELEASE }}
          generate_release_notes: true
          files: artifacts/*
