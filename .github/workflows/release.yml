name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            package_args: "--adhoc-sign"
            briefcase: "python -m briefcase"
          - os: windows-latest
            package_args: ""
            briefcase: "python -m briefcase"
          - os: ubuntu-latest
            package_args: "-p flatpak"
            briefcase: "briefcase"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: runner.os != 'Linux'   # Linux uses the system python3 (Briefcase requires it)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Briefcase
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            pipx install --python /usr/bin/python3 briefcase
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            python -m pip install briefcase
          fi

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak flatpak-builder \
            gir1.2-gtk-3.0 libcairo2-dev libcanberra-gtk3-module libgirepository1.0-dev \
            libpango1.0-dev libgdk-pixbuf2.0-dev pkg-config

      - name: briefcase create
        run: ${{ matrix.briefcase }} create

      - name: briefcase build
        run: ${{ matrix.briefcase }} build

      - name: briefcase package
        shell: bash
        run: ${{ matrix.briefcase }} package ${{ matrix.package_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: COVID-Time-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error
