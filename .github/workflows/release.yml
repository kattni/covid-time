name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            format: ""
            package_args: '--identity "$APPLE_SIGNING_IDENTITY" --no-wait'
          - os: windows-latest
            format: ""
            package_args: ""
          - os: ubuntu-latest
            format: "linux flatpak"
            package_args: ""
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: runner.os != 'Linux'   # Linux uses the system python3 (Briefcase requires it)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Briefcase
        run: pip install git+https://github.com/beeware/briefcase.git@main

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak flatpak-builder \
            gir1.2-gtk-3.0 libcairo2-dev libcanberra-gtk3-module libgirepository1.0-dev \
            libpango1.0-dev libgdk-pixbuf2.0-dev pkg-config

      # Import the Developer ID Application cert into a dedicated keychain and store
      # the App Store Connect API key as the notarytool profile Briefcase looks for
      # (briefcase-macOS-<team_id>). Briefcase then signs + notarizes automatically.
      - name: Set up macOS code-signing & notarization
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_API_KEY_ISSUER: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER }}
        run: |
          KC="$RUNNER_TEMP/signing.keychain-db"
          KCPW="$(uuidgen)"
          security create-keychain -p "$KCPW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KCPW" "$KC"

          echo "$MACOS_CERTIFICATE" | base64 -D -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KC"

          security list-keychains -d user -s "$KC" login.keychain-db
          security default-keychain -d user -s "$KC"

          echo "$ASC_API_KEY" | base64 -D -o "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials "briefcase-macOS-$APPLE_TEAM_ID" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_KEY_ISSUER" \
            --keychain "$KC"

      - name: briefcase create
        run: briefcase create ${{ matrix.format }}

      - name: briefcase build
        run: briefcase build ${{ matrix.format }}

      - name: briefcase package
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: briefcase package ${{ matrix.format }} ${{ matrix.package_args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: COVID-Time-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build   # all three OS legs must succeed; never release a partial build
    runs-on: ubuntu-latest
    env:
      # Tag pushes ship on the pushed tag; workflow_dispatch creates a CI prerelease
      # with a generated tag so test runs don't masquerade as real releases.
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('ci-{0}', github.run_number) }}
      IS_PRERELEASE: ${{ !startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release and attach artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          prerelease: ${{ env.IS_PRERELEASE }}
          generate_release_notes: true
          files: artifacts/*
